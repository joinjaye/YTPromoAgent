name: Deploy Dashboard

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["PromoLeads Crawl"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # 不能用 github.event.workflow_run.head_sha —— 它是 crawl workflow
          # *开始时* 的 commit，而 crawl 自己在运行过程中还会 push 一个新的
          # "chore: update crawl log" commit（更新 data/leads.db）。用 head_sha
          # 会导致每次部署都固定落后 crawl 自己那次提交，看板永远差一拍。
          # main 分支在 workflow_run 触发时已经包含 crawl 刚推的那次提交，直接用它。
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        run: python3 reporter.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
