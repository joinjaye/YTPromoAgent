name: PromoLeads Crawl

on:
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Run crawler
        run: python main.py

      - name: Persist crawl log
        # 兜底：main.py 内部已经把已知的失败模式都处理成"跳过继续、正常退出"，
        # 这里加 if: always() 是最后一道防线 —— 就算 Run crawler 因为完全没预料到
        # 的问题（比如依赖安装失败之外的运行时崩溃）以非 0 退出，只要本地 leads.db
        # 里已经有数据，也要把它提交上去，不能让已经抓到的数据只留在 runner 里就被销毁。
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/leads.db
          git diff --staged --quiet || git commit -m "chore: update crawl log [skip ci]"
          git push
