name: PromoLeads Crawl

on:
  schedule:
    - cron: '0 1 * * *'   # 每天 UTC 01:00
  workflow_dispatch:        # 支持手动触发

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        env:
          YOUTUBE_API_KEY:          ${{ secrets.YOUTUBE_API_KEY }}
          FEISHU_APP_ID:            ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET:        ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_APP_TOKEN: ${{ secrets.FEISHU_BITABLE_APP_TOKEN }}
          FEISHU_BITABLE_TABLE_ID:  ${{ secrets.FEISHU_BITABLE_TABLE_ID }}
          FEISHU_WEBHOOK_URL:       ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python main.py

      - name: Persist crawl log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/leads.db
          git diff --staged --quiet || git commit -m "chore: update crawl log [skip ci]"
          git push
